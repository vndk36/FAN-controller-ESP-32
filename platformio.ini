; PlatformIO Project Configuration File
;
; Board: this is wired as a generic ESP32-C3 SuperMini, NOT a Seeed XIAO
; ESP32-C3. Even though the SuperMini has no dedicated PlatformIO board
; entry, "esp32-c3-devkitm-1" is the correct generic match: it uses plain
; GPIO numbers with no pin-remapping overlay, which lines up with the
; GPIOxx labels silkscreened on the SuperMini itself. Do NOT use
; "seeed_xiao_esp32c3" - that board definition remaps D0-D10 to different
; physical GPIOs than the SuperMini, so pin numbers in code won't match
; where things are actually wired.
;
; Using analogWrite()/analogWriteFrequency()/analogWriteResolution() (built
; into the Arduino-ESP32 core) instead of the raw ledcAttach/ledcWrite API
; means we no longer need the pioarduino fork - the official platform below
; works fine.
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=1           ; required alongside CDC_ON_BOOT for native-USB Serial to exist
    -D ARDUINO_USB_CDC_ON_BOOT=1    ; keep USB-serial usable on native-USB C3 boards

; Arduino Uno environment - same ATmega328P chip and pinout as the Nano
; wiring above, so no source changes are needed; just a different board ID.
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; Arduino Nano environment (newer-bootloader Nanos). If you find your Nano
; later and upload fails on this env, try "nanoatmega328" instead (old
; bootloader).
[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200